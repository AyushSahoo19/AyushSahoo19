  <!-- Corner marks -->
  <path d="M 18,32 L 18,18 L 32,18" stroke="#30363d" stroke-width="1" fill="none" stroke-linecap="square"/>
  <path d="M 802,32 L 802,18 L 788,18" stroke="#30363d" stroke-width="1" fill="none" stroke-linecap="square"/>
  <path d="M 18,128 L 18,142 L 32,142" stroke="#30363d" stroke-width="1" fill="none" stroke-linecap="square"/>
  <path d="M 802,128 L 802,142 L 788,142" stroke="#30363d" stroke-width="1" fill="none" stroke-linecap="square"/>

  <!-- Label -->
  <text x="410" y="52" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="500" letter-spacing="0.35em" fill="#484f58">
    SOFTWARE ENGINEER · RESEARCHER
  </text>

  <!-- Name -->
  <text x="410" y="97" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="0.12em" fill="url(#name-grad)">
